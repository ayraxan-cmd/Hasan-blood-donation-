<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD - Task Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #22c55e; --bg-dark: #0f172a; --card-dark: #1e293b; --yellow: #facc15; --red-box: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; }

        .view-section { display: none; min-height: 100vh; width: 100%; overflow-y: auto; padding-bottom: 80px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }

        .navbar { background: var(--card-dark); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000; }
        .red-title { background: var(--red-box); padding: 5px 15px; border-radius: 8px; font-weight: 800; color: white; }
        .menu-icon { font-size: 28px; color: var(--primary-green); cursor: pointer; }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card-dark); z-index: 2005; transition: 0.4s; padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; color: #cbd5e1; cursor: pointer; border-radius: 10px; margin-bottom: 5px; border-bottom: 1px solid #334155; font-weight: 600; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; }

        .container { padding: 20px; max-width: 480px; margin: 0 auto; }
        #activationNotice { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: 700; cursor: pointer; border: 2px dashed #ef4444; display: none; }

        .welcome-banner { background: var(--yellow); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; color: #000; }
        .balance-box { background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        
        .card { background: var(--card-dark); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; text-align: center; }
        .btn-green { background: var(--primary-green); color: white; }
        
        #taskTimer { display: none; margin-top: 15px; font-weight: bold; color: var(--yellow); text-align: center; border: 1px solid var(--yellow); padding: 10px; border-radius: 10px; }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color: var(--primary-green); margin-bottom: 25px;">Menu</h2>
        <div class="sidebar-item" onclick="showView('homeView')">🏠 হোম পেজ</div>
        <div class="sidebar-item" onclick="showView('profileView')">👤 প্রোফাইল</div>
        <div class="sidebar-item" onclick="checkReferView()">🔗 রেফার ও আয়</div>
        <div class="sidebar-item" onclick="showView('historyView')">📜 লেনদেন ইতিহাস</div>
        <div class="sidebar-item" onclick="showView('withdrawView')">📤 উইথড্র</div>
        <div class="sidebar-item" onclick="openModal()">📥 ডিপোজিট</div>
        <div class="sidebar-item" style="color: #ef4444; margin-top: 50px;" onclick="handleLogout()">🚪 লগআউট</div>
    </div>

    <div id="homeView" class="view-section active">
        <div class="navbar">
            <div class="menu-icon" onclick="toggleMenu(true)">☰</div>
            <div class="red-title">Smart Invest</div>
            <div></div>
        </div>
        <div class="container">
            <div id="activationNotice" onclick="openModal()">⚠️ একাউন্ট একটিভ করতে ১০০ টাকা ডিপোজিট করুন</div>
            <div class="welcome-banner">
                <h2 id="welcomeText">স্বাগতম!</h2>
                <p>নিরাপদ বিনিয়োগের বিশ্বস্ত মাধ্যম</p>
            </div>
            <div class="balance-box">
                <p>বর্তমান ব্যালেন্স</p>
                <div style="font-size: 35px; font-weight: 800;" id="userBalance">৳ 0</div>
            </div>
            
            <button class="btn btn-green" id="taskBtn" onclick="handleTaskClick()" style="background:#3b82f6">ডেইলি টাস্ক শুরু করুন</button>
            <div id="taskTimer">অপেক্ষা করুন... <span id="seconds">5</span>s</div>
        </div>
    </div>

    <div id="profileView" class="view-section">
        <div class="navbar"><div class="menu-icon" onclick="showView('homeView')">←</div><div class="red-title">প্রোফাইল</div><div></div></div>
        <div class="container"><div class="card"><p id="profName">-</p></div><div class="card"><p id="profStatus">-</p></div></div>
    </div>

    <div id="referView" class="view-section">
        <div class="navbar"><div class="menu-icon" onclick="showView('homeView')">←</div><div class="red-title">রেফার ও আয়</div><div></div></div>
        <div class="container"><div class="card" style="text-align:center;"><p id="refLinkDisp">-</p><button class="btn btn-green" onclick="copyReferLink()">Copy Link</button></div></div>
    </div>

    <div id="depositModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:4000; align-items:center; justify-content:center;">
        <div style="background:var(--card-dark); padding:25px; border-radius:25px; width:90%; max-width:400px;">
            <h3 style="text-align:center">এক্টিভেশন ১০০৳</h3><br>
            <input type="text" id="depTrx" placeholder="ট্রাঞ্জেকশন আইডি" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
            <button class="btn btn-green" onclick="submitDeposit()">সাবমিট</button>
            <button class="btn" onclick="closeModal()" style="background:transparent; color:#94a3b8">বন্ধ করুন</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, addDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        let userActive = false;
        const TASK_URL = "https://www.facebook.com/facebookuser1972"; // আপনার ফেসবুক লিংক

        onAuthStateChanged(auth, (user) => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        userActive = d.active || false;
                        document.getElementById('userBalance').innerText = "৳ " + (d.balance || 0);
                        document.getElementById('activationNotice').style.display = userActive ? 'none' : 'block';
                        document.getElementById('profStatus').innerText = userActive ? "Active ✅" : "Inactive ❌";
                        document.getElementById('profName').innerText = d.name;
                        document.getElementById('refLinkDisp').innerText = window.location.origin + window.location.pathname + "?ref=" + user.uid;
                    }
                });
            }
        });

        // ডেইলি টাস্ক লজিক
        window.handleTaskClick = () => {
            if(!userActive) {
                alert("টাস্ক করতে আগে একাউন্ট একটিভ করুন!");
                return openModal();
            }

            window.open(TASK_URL, "_blank");

            let timeLeft = 5;
            const btn = document.getElementById('taskBtn');
            const timerDiv = document.getElementById('taskTimer');
            const secSpan = document.getElementById('seconds');

            btn.disabled = true;
            btn.style.opacity = "0.5";
            timerDiv.style.display = "block";

            const timer = setInterval(async () => {
                timeLeft--;
                secSpan.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerDiv.style.display = "none";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    
                    try {
                        await updateDoc(doc(db, "users", auth.currentUser.uid), {
                            balance: increment(10)
                        });
                        alert("সফল! টাস্ক বোনাস ১০ টাকা আপনার ব্যালেন্সে যোগ হয়েছে।");
                    } catch (e) {
                        alert("ত্রুটি! ব্যালেন্স যোগ করা যায়নি।");
                    }
                }
            }, 1000);
        };

        // রেফার ভিউ চেক
        window.checkReferView = () => {
            if(!userActive) {
                alert("রেফার করতে আগে একাউন্ট একটিভ করুন!");
                openModal();
            } else {
                showView('referView');
            }
        };

        // অন্যান্য গ্লোবাল ফাংশন
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleMenu(false);
        };
        window.toggleMenu = (open) => {
            document.getElementById('sidebar').classList.toggle('active', open);
            document.getElementById('overlay').style.display = open ? 'block' : 'none';
        };
        window.openModal = () => document.getElementById('depositModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('depositModal').style.display = 'none';
        window.handleLogout = () => signOut(auth);
        window.copyReferLink = () => { navigator.clipboard.writeText(document.getElementById('refLinkDisp').innerText); alert("Refer link copied!"); };
    </script>
</body>
</html>
