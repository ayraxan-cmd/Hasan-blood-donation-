<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-green: #22c55e; 
            --task-blue: #3b82f6;
            --bg-dark: #0f172a; 
            --card-dark: #1e293b; 
            --text-white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-white); overflow-x: hidden; }

        /* Navigation & Sidebar Menu */
        .navbar { 
            background: var(--card-dark); padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 1000;
        }
        .menu-icon { font-size: 28px; color: var(--primary-green); cursor: pointer; }
        
        .sidebar { 
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: var(--card-dark); z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { color: var(--primary-green); margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .sidebar-item { padding: 15px; color: #cbd5e1; cursor: pointer; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; }
        .sidebar-item:hover { background: rgba(34, 197, 94, 0.1); color: var(--primary-green); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }

        /* Main Content Layout */
        .container { padding: 20px; max-width: 450px; margin: 0 auto; }

        /* User Profile & Balance (Green Style) */
        .balance-section { 
            background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); 
            padding: 30px 20px; border-radius: 24px; text-align: center;
            box-shadow: 0 10px 25px rgba(22, 197, 94, 0.2); margin-bottom: 25px;
        }
        .balance-label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; }
        .balance-amount { font-size: 44px; font-weight: 800; margin: 15px 0; letter-spacing: 1px; }

        /* Task Section (Blue Style) */
        .task-card { 
            background: var(--card-dark); padding: 25px; border-radius: 24px; 
            border: 2px solid var(--task-blue); text-align: center;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1);
        }
        .task-card h3 { color: var(--task-blue); font-size: 20px; margin-bottom: 10px; }
        .task-card p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        .btn-task { 
            width: 100%; padding: 16px; border: none; border-radius: 16px; 
            background: var(--task-blue); color: white; font-weight: 700; 
            font-size: 17px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-task:active { transform: scale(0.97); }

        /* Animation */
        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
        .animate { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <h2>মেনু</h2>
        <div class="sidebar-item" onclick="location.reload()">🏠 হোম পেজ</div>
        <div class="sidebar-item" onclick="alert('শীঘ্রই আসছে')">📥 ডিপোজিট লিস্ট</div>
        <div class="sidebar-item" onclick="alert('শীঘ্রই আসছে')">📤 উইথড্র লিস্ট</div>
        <div class="sidebar-item" onclick="alert('শীঘ্রই আসছে')">👥 ইউজার প্রোফাইল</div>
        <div class="sidebar-item" style="color: #ef4444; margin-top: 50px;" onclick="alert('Logout')">🚪 লগআউট</div>
    </div>

    <div class="navbar">
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div style="font-weight: 700; font-size: 18px;">Smart Invest BD</div>
        <div style="width: 30px;"></div> </div>

    <div class="container animate">
        
        <div class="balance-section">
            <h2 id="userName" style="margin-bottom: 5px; font-size: 22px;">স্বাগতম!</h2>
            <p style="font-size: 13px; opacity: 0.8; margin-bottom: 20px;">আপনার নিরাপদ বিনিয়োগের বিশ্বস্ত সঙ্গী</p>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px;">
            <p class="balance-label">ব র্ত মা ন  ব্যা লে ন্স</p>
            <div class="balance-amount" id="userBalance">৳ 0</div>
        </div>

        <div class="task-card">
            <div style="font-size: 40px; margin-bottom: 10px;">🎯</div>
            <h3>ডেইলি টাস্ক কমপ্লিট</h3>
            <p>প্রতিদিন টাস্ক কমপ্লিট করে জিতে নিন নিশ্চিত ১০ টাকা বোনাস!</p>
            <button class="btn-task" onclick="startTask()">টাস্ক শুরু করুন</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();

        let currentUid = "";
        let taskUrl = "";

        // ১. মেনু কন্ট্রোল
        window.toggleMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        };

        // ২. ইউজার ব্যালেন্স ও ডাটা
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUid = user.uid;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('userName').innerText = "স্বাগতম, " + d.name;
                        document.getElementById('userBalance').innerText = "৳ " + d.balance.toLocaleString();
                    }
                });
            }
        });

        // ৩. টাস্ক লিংক আপডেট
        onSnapshot(doc(db, "settings", "taskConfig"), (s) => {
            if(s.exists()) taskUrl = s.data().url;
        });

        // ৪. টাস্ক ফাংশন
        window.startTask = () => {
            if(!taskUrl) return alert("বর্তমানে কোনো কাজ নেই!");
            window.open(taskUrl, '_blank');
            
            setTimeout(async () => {
                if(confirm("৫ সেকেন্ড শেষ! ১০ টাকা বোনাস নিতে 'OK' চাপুন।")) {
                    await updateDoc(doc(db, "users", currentUid), { balance: increment(10) });
                }
            }, 5000);
        };
    </script>
</body>
</html>
