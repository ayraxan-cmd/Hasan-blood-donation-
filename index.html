<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #22c55e; 
            --bg: #0b0f1a; 
            --card: #161e2d; 
            --text: #ffffff;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; }

        /* Smooth Page Transition */
        .page { 
            display: none; height: 100vh; width: 100vw; 
            position: absolute; top: 0; left: 0; 
            overflow-y: auto; padding-bottom: 50px;
        }
        .page.active { display: block; animation: slideIn 0.3s ease-out; }

        /* Premium Navbar */
        .navbar { 
            background: rgba(22, 30, 45, 0.95); 
            backdrop-filter: blur(10px);
            padding: 18px 20px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            position: sticky; top: 0; z-index: 100;
        }
        .menu-icon { font-size: 26px; color: var(--primary); margin-right: 15px; cursor: pointer; }
        .nav-title { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }

        /* Container & Cards */
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        .hero-banner { 
            background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); 
            padding: 35px 25px; border-radius: 24px; 
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2);
        }

        .stat-card { 
            background: var(--card); 
            padding: 35px 20px; border-radius: 28px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* High Quality Balance UI */
        .balance-label { color: #94a3b8; font-size: 14px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; }
        .amount-display { 
            font-size: 48px; font-weight: 800; color: var(--primary); 
            margin: 25px 0; display: block; 
            letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
        }
        
        /* Action Buttons */
        .btn-main { 
            width: 100%; padding: 18px; border: none; 
            border-radius: 18px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; font-size: 18px; 
            background: var(--primary); color: white;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }
        .btn-main:active { transform: scale(0.96); }

        /* Timer UI */
        #timerBox { font-size: 60px; font-weight: 900; color: #fbbf24; margin: 30px 0; }

        @keyframes slideIn { from {opacity: 0; transform: translateX(20px);} to {opacity: 1; transform: translateX(0);} }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <div class="navbar">
            <div class="menu-icon">☰</div>
            <div class="nav-title">Smart Invest BD</div>
        </div>
        <div class="container">
            <div class="hero-banner">
                <h2 id="userName" style="font-size: 24px;">স্বাগতম!</h2>
                <p style="opacity: 0.9; margin-top: 5px;">আপনার নিরাপদ বিনিয়োগের বিশ্বস্ত সঙ্গী</p>
            </div>

            <div class="stat-card">
                <p class="balance-label">ব র্ত মা ন  ব্যা লে ন্স</p>
                <div class="amount-display" id="userBalance">৳ 0</div>
                <button class="btn-main" onclick="goTo('taskPage')">টাস্ক কমপ্লিট করুন</button>
            </div>
        </div>
    </div>

    <div id="taskPage" class="page">
        <div class="navbar">
            <div class="menu-icon" onclick="goTo('homePage')">←</div>
            <div class="nav-title">ডেইলি টাস্ক</div>
        </div>
        <div class="container">
            <div class="stat-card" style="margin-top: 40px;">
                <div style="font-size: 50px; margin-bottom: 15px;">🎯</div>
                <h3 style="color: var(--primary); font-size: 22px;">নতুন কাজ উপলব্ধ</h3>
                <p style="margin: 20px 0; color: #94a3b8; font-size: 15px; line-height: 1.6;">
                    নিচের বাটনে ক্লিক করে কাজ শুরু করুন। ৫ সেকেন্ডের টাইমার শেষ হলে আপনার একাউন্টে ৳১০ যোগ হবে।
                </p>
                
                <div id="timerBox" style="display: none;">৫</div>
                
                <button id="taskActionBtn" class="btn-main" onclick="executeTask()">লিংক ওপেন করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();

        let liveLink = "";
        let currentUser = null;

        // রিয়েল-টাইম টাস্ক লিংক লিসেনার (অ্যাডমিন থেকে)
        onSnapshot(doc(db, "settings", "taskConfig"), (snapshot) => {
            if(snapshot.exists()) liveLink = snapshot.data().url;
        });

        // ইউজার ডাটা লিসেনার
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('userName').innerText = "স্বাগতম, " + data.name;
                        document.getElementById('userBalance').innerText = "৳ " + data.balance.toLocaleString();
                    }
                });
            }
        });

        // টাস্ক এক্সিকিউশন
        window.executeTask = () => {
            if(!liveLink) return alert("অ্যাডমিন এখনো কোনো লিংক দেয়নি!");

            window.open(liveLink, '_blank'); // অন্য উইন্ডোতে ওপেন হবে

            const btn = document.getElementById('taskActionBtn');
            const timer = document.getElementById('timerBox');
            
            btn.disabled = true;
            btn.style.opacity = "0.5";
            btn.innerText = "প্রসেসিং হচ্ছে...";
            timer.style.display = "block";

            let seconds = 5;
            const countdown = setInterval(async () => {
                seconds--;
                timer.innerText = seconds;
                if(seconds <= 0) {
                    clearInterval(countdown);
                    timer.style.display = "none";
                    try {
                        await updateDoc(doc(db, "users", currentUser.uid), { balance: increment(10) });
                        alert("অভিনন্দন! ১০ টাকা যোগ করা হয়েছে।");
                        goTo('homePage');
                        btn.disabled = false;
                        btn.style.opacity = "1";
                        btn.innerText = "লিংক ওপেন করুন";
                    } catch (e) { alert("Error!"); }
                }
            }, 1000);
        };

        // হাই-কোয়ালিটি নেভিগেশন
        window.goTo = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            history.pushState({id: pageId}, null, "");
        };

        window.onpopstate = (e) => {
            const id = (e.state && e.state.id) ? e.state.id : 'homePage';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        history.replaceState({id: 'homePage'}, null, "");
    </script>
</body>
</html>
