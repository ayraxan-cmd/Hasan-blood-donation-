<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: #e2e8f0; overflow-x: hidden; }
        
        /* Navbar & Sidebar */
        .navbar { background: #1e293b; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 999; }
        .menu-btn { font-size: 24px; cursor: pointer; color: #22c55e; margin-right: 15px; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1e293b; z-index: 1002; transition: 0.3s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; border-bottom: 1px solid #334155; cursor: pointer; display: flex; align-items: center; color: #94a3b8; }
        .sidebar-item:hover { color: #22c55e; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1001; }

        /* General UI */
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .hero { text-align: center; padding: 30px 0; background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); border-radius: 20px; margin-bottom: 20px; }
        .live-stats { background: #1e293b; border: 2px solid #334155; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .amount { font-size: 32px; font-weight: 700; color: #22c55e; }
        
        /* Auth */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; text-align: center; border: 1px solid #334155; }
        
        /* Forms */
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 14px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: white; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: #22c55e; color: white; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1005; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color: #22c55e; margin-bottom: 20px;">মেনু</h2>
        <div class="sidebar-item" onclick="showProfile()">👤 প্রোফাইল</div>
        <div class="sidebar-item" onclick="openModal('depositModal')">📥 ডিপোজিট</div>
        <div class="sidebar-item" onclick="openModal('withdrawModal')">📤 উইথড্র</div>
        <div class="sidebar-item" onclick="contactHelp()">🛠 হেল্প ও সাপোর্ট</div>
        <div class="sidebar-item" style="color: #ef4444;" onclick="handleLogout()">🚪 লগআউট</div>
    </div>

    <div id="authScreen">
        <div class="auth-box" id="loginBox">
            <h2>লগইন</h2><br>
            <div class="input-group"><input type="email" id="loginEmail" placeholder="ইমেল"></div>
            <div class="input-group"><input type="password" id="loginPass" placeholder="পাসওয়ার্ড"></div>
            <button class="btn btn-primary" onclick="handleLogin()">প্রবেশ করুন</button>
            <p style="margin-top:15px; color:#94a3b8" onclick="toggleAuth('signup')">নতুন অ্যাকাউন্ট খুলুন</p>
        </div>
        <div class="auth-box" id="signupBox" style="display: none;">
            <h2>রেজিস্ট্রেশন</h2><br>
            <div class="input-group"><input type="text" id="signupName" placeholder="নাম"></div>
            <div class="input-group"><input type="email" id="signupEmail" placeholder="ইমেল"></div>
            <div class="input-group"><input type="password" id="signupPass" placeholder="পাসওয়ার্ড"></div>
            <button class="btn btn-primary" onclick="handleSignUp()">অ্যাকাউন্ট তৈরি করুন</button>
            <p style="margin-top:15px; color:#94a3b8" onclick="toggleAuth('login')">লগইন করুন</p>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="navbar">
            <div class="menu-btn" onclick="openSidebar()">☰</div>
            <div style="font-weight: 700; font-size: 18px;">Smart Invest BD</div>
        </div>

        <div class="container">
            <div class="hero">
                <h2 id="welcomeName">স্বাগতম!</h2>
                <p>আপনার নিরাপদ বিনিয়োগের বিশ্বস্ত সঙ্গী</p>
            </div>

            <div class="live-stats">
                <p style="color: #94a3b8;">বর্তমান ব্যালেন্স</p>
                <div class="amount" id="userBalance">৳ 0</div>
            </div>

            <div style="background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155;">
                <h3>মাসিক প্রফিট ১৫%</h3>
                <p style="font-size: 14px; color: #94a3b8; margin-bottom: 15px;">মিনিমাম ইনভেস্ট ৳১০০০</p>
                <button class="btn btn-primary" onclick="openModal('depositModal')">এখনই শুরু করুন</button>
            </div>
        </div>
    </div>

    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3>ডিপোজিট</h3>
            <p>বিকাশ (Personal): 01946024013</p><br>
            <div class="input-group"><input type="number" id="depAmount" placeholder="পরিমাণ"></div>
            <div class="input-group"><input type="text" id="depTrx" placeholder="TrxID"></div>
            <button class="btn btn-primary" onclick="submitDeposit()">সাবমিট</button>
            <button class="btn" style="background:#334155; color:white" onclick="closeModal('depositModal')">বন্ধ করুন</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>উইথড্র</h3><br>
            <div class="input-group"><input type="number" id="witAmount" placeholder="পরিমাণ"></div>
            <div class="input-group"><input type="text" id="witNumber" placeholder="বিকাশ নাম্বার"></div>
            <button class="btn btn-primary" onclick="submitWithdraw()">উইথড্র রিকোয়েস্ট</button>
            <button class="btn" style="background:#334155; color:white" onclick="closeModal('withdrawModal')">বন্ধ করুন</button>
        </div>
    </div>

    <script type="module">
        // --- ফায়ারবেস কোড (আগের মতোই থাকবে) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        // লগইন/সাইনআপ লজিক
        window.handleSignUp = async () => {
            const n = document.getElementById('signupName').value;
            const e = document.getElementById('signupEmail').value;
            const p = document.getElementById('signupPass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { name: n, email: e, password: p, balance: 0, status: "active" });
            } catch (err) { alert(err.message); }
        };

        window.handleLogin = async () => {
            const e = document.getElementById('loginEmail').value;
            const p = document.getElementById('loginPass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch (err) { alert("ভুল ইমেল বা পাসওয়ার্ড!"); }
        };

        window.handleLogout = () => signOut(auth);

        // ডেটা হ্যান্ডলিং
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if (s.exists()) {
                        const d = s.data();
                        if(d.status === 'banned') { alert("ব্যান করা হয়েছে!"); signOut(auth); return; }
                        document.getElementById('authScreen').style.display = 'none';
                        document.getElementById('mainContent').style.display = 'block';
                        document.getElementById('welcomeName').innerText = "স্বাগতম, " + d.name;
                        document.getElementById('userBalance').innerText = "৳ " + d.balance.toLocaleString();
                    }
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // ডিপোজিট/উইথড্র ফাংশন (সংক্ষিপ্ত)
        window.submitDeposit = async () => {
            const a = document.getElementById('depAmount').value;
            const t = document.getElementById('depTrx').value;
            await addDoc(collection(db, "transactions"), { userId: auth.currentUser.uid, userEmail: auth.currentUser.email, amount: Number(a), transactionId: t, status: "pending", date: new Date().toISOString() });
            alert("সফল হয়েছে!"); closeModal('depositModal');
        };
    </script>

    <script>
        // ব্যাক বাটন ফিক্সিং লজিক
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            // যদি মেনু বা মোডাল খোলা থাকে, তবে ব্যাক বাটনে সেগুলো বন্ধ হবে
            if (document.getElementById('sidebar').classList.contains('active')) {
                closeSidebar();
                history.pushState(null, null, location.href);
            } else if (document.querySelector('.modal[style*="flex"]')) {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
                history.pushState(null, null, location.href);
            } else {
                // সরাসরি বের হয়ে যাবে না, চাইলে এখানে কনফার্মেশন ডায়ালগ দিতে পারেন
                if(confirm("আপনি কি অ্যাপ থেকে বের হতে চান?")) {
                    history.back();
                } else {
                    history.pushState(null, null, location.href);
                }
            }
        };

        // UI কন্ট্রোল
        function openSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }
        function openModal(id) {
            closeSidebar();
            document.getElementById(id).style.display = 'flex';
            history.pushState(null, null, location.href); // ব্যাক বাটনের জন্য স্টেট পুশ
        }
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        function toggleAuth(type) {
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
        }
        function contactHelp() { window.open('https://wa.me/8801946024013', '_blank'); }
        function showProfile() { alert("প্রোফাইল ফিচার শীঘ্রই আসছে!"); }
    </script>
</body>
</html>
