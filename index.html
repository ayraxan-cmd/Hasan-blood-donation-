<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body { font-family: 'Hind Siliguri', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        
        /* Auth Screens */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #334155; }
        
        /* Dashboard UI */
        .hero { text-align: center; padding: 30px 0; background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3); }
        .live-stats { background: #1e293b; border: 2px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .amount { font-size: 32px; font-weight: 700; color: #22c55e; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group input { width: 100%; padding: 14px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: white; font-size: 16px; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: #22c55e; color: white; }
        .btn-outline { background: transparent; border: 2px solid #334155; color: #94a3b8; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1001; align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-box" id="loginBox">
            <h2 style="margin-bottom: 20px;">লগইন</h2>
            <div class="input-group"><input type="email" id="loginEmail" placeholder="ইমেল"></div>
            <div class="input-group"><input type="password" id="loginPass" placeholder="পাসওয়ার্ড"></div>
            <button class="btn btn-primary" onclick="handleLogin()">প্রবেশ করুন</button>
            <p style="margin-top:15px; font-size:14px; color:#94a3b8" onclick="toggleAuth('signup')">অ্যাকাউন্ট নেই? <span style="color:#22c55e">তৈরি করুন</span></p>
        </div>
        <div class="auth-box" id="signupBox" style="display: none;">
            <h2 style="margin-bottom: 20px;">নতুন অ্যাকাউন্ট</h2>
            <div class="input-group"><input type="text" id="signupName" placeholder="পুরো নাম"></div>
            <div class="input-group"><input type="email" id="signupEmail" placeholder="ইমেল"></div>
            <div class="input-group"><input type="password" id="signupPass" placeholder="পাসওয়ার্ড (৬+ ডিজিট)"></div>
            <button class="btn btn-primary" onclick="handleSignUp()">রেজিস্ট্রেশন করুন</button>
            <p style="margin-top:15px; font-size:14px; color:#94a3b8" onclick="toggleAuth('login')">অ্যাকাউন্ট আছে? <span style="color:#22c55e">লগইন করুন</span></p>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <div class="hero">
            <h1>Smart Invest BD</h1>
            <p id="welcomeName">লোড হচ্ছে...</p>
        </div>

        <div class="live-stats">
            <p style="font-size: 14px; color: #94a3b8;">আপনার বর্তমান ব্যালেন্স</p>
            <div class="amount" id="userBalance">৳ 0</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-primary" onclick="openModal('depositModal')">ডিপোজিট</button>
            <button class="btn btn-outline" onclick="openModal('withdrawModal')">উইথড্র</button>
        </div>

        <button class="btn btn-outline" style="margin-top: 30px;" onclick="handleLogout()">লগ আউট</button>
    </div>

    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h3>ডিপোজিট করুন</h3>
            <p style="margin: 10px 0; color: #94a3b8;">বিকাশ (Personal): 01946024013</p>
            <div class="input-group"><input type="number" id="depAmount" placeholder="টাকার পরিমাণ"></div>
            <div class="input-group"><input type="text" id="depTrx" placeholder="TrxID (ট্রানজেকশন আইডি)"></div>
            <button class="btn btn-primary" onclick="submitDeposit()">সাবমিট করুন</button>
            <button class="btn btn-outline" onclick="closeModal('depositModal')">বন্ধ করুন</button>
        </div>
    </div>

    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h3>উইথড্র রিকোয়েস্ট</h3>
            <div class="input-group"><input type="number" id="witAmount" placeholder="টাকার পরিমাণ"></div>
            <div class="input-group"><input type="text" id="witNumber" placeholder="বিকাশ নাম্বার"></div>
            <button class="btn btn-primary" onclick="submitWithdraw()">উইথড্র দিন</button>
            <button class="btn btn-outline" onclick="closeModal('withdrawModal')">বন্ধ করুন</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c",
            measurementId: "G-55RG4PR7ZF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        // রেজিস্ট্রেশন
        window.handleSignUp = async () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            if(!name || !email || pass.length < 6) return alert("সঠিক তথ্য দিন (পাসওয়ার্ড কমপক্ষে ৬ অক্ষর)");
            
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), {
                    name, email, password: pass, balance: 0, status: "active"
                });
            } catch (e) { alert(e.message); }
        };

        // লগইন
        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("লগইন ব্যর্থ!"); }
        };

        // লগ আউট
        window.handleLogout = () => signOut(auth);

        // ডিপোজিট সাবমিট
        window.submitDeposit = async () => {
            const amount = document.getElementById('depAmount').value;
            const trx = document.getElementById('depTrx').value;
            if(!amount || !trx) return alert("সব তথ্য দিন");
            
            await addDoc(collection(db, "transactions"), {
                userId: auth.currentUser.uid,
                userEmail: auth.currentUser.email,
                amount: Number(amount),
                transactionId: trx,
                status: "pending",
                date: new Date().toISOString()
            });
            alert("রিকোয়েস্ট পাঠানো হয়েছে!");
            closeModal('depositModal');
        };

        // উইথড্র সাবমিট
        window.submitWithdraw = async () => {
            const amount = Number(document.getElementById('witAmount').value);
            const number = document.getElementById('witNumber').value;
            const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
            
            if(amount > userDoc.data().balance) return alert("পর্যাপ্ত ব্যালেন্স নেই!");
            
            await addDoc(collection(db, "withdrawals"), {
                userId: auth.currentUser.uid,
                userEmail: auth.currentUser.email,
                amount: amount,
                number: number,
                method: "bKash",
                status: "pending",
                date: new Date().toISOString()
            });
            alert("উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!");
            closeModal('withdrawModal');
        };

        // রিয়েলটাইম আপডেট ও ব্যান চেক
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if(data.status === "banned") {
                            alert("আপনার অ্যাকাউন্টটি ব্যান করা হয়েছে!");
                            signOut(auth);
                            return;
                        }
                        document.getElementById('authScreen').style.display = 'none';
                        document.getElementById('mainContent').style.display = 'block';
                        document.getElementById('welcomeName').innerText = "স্বাগতম, " + data.name;
                        document.getElementById('userBalance').innerText = "৳ " + data.balance.toLocaleString();
                    }
                });
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // UI Helpers
        window.toggleAuth = (type) => {
            document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signupBox').style.display = type === 'signup' ? 'block' : 'none';
        };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    </script>
</body>
</html>
