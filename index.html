<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        
        /* Navbar & Sidebar */
        .navbar { background: var(--card); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 999; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); z-index: 1002; transition: 0.3s; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; border-bottom: 1px solid #334155; cursor: pointer; color: #94a3b8; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1001; }

        /* UI Elements */
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .hero-card { background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; text-align: center; margin-bottom: 20px; }
        .amount { font-size: 32px; font-weight: 700; color: var(--primary); margin: 10px 0; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #334155; cursor: not-allowed; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1005; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        
        #timerDisplay { font-size: 40px; font-weight: bold; color: #fbbf24; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color: var(--primary); margin-bottom: 20px;">Smart Invest</h2>
        <div class="sidebar-item" onclick="openModal('taskModal')">🎯 ডেইলি টাস্ক (৳১০)</div>
        <div class="sidebar-item" onclick="alert('শীঘ্রই আসছে')">📥 ডিপোজিট</div>
        <div class="sidebar-item" onclick="alert('শীঘ্রই আসছে')">📤 উইথড্র</div>
        <div class="sidebar-item" style="color: #ef4444;" onclick="location.reload()">🔄 রিফ্রেশ অ্যাপ</div>
    </div>

    <div class="navbar">
        <div class="menu-btn" onclick="openSidebar()">☰</div>
        <div style="font-weight: 700;">Smart Invest BD</div>
    </div>

    <div class="container">
        <div class="hero-card">
            <h2 id="userName">স্বাগতম!</h2>
            <p>আপনার নিরাপদ বিনিয়োগের বিশ্বস্ত সঙ্গী</p>
        </div>

        <div class="stat-card">
            <p style="color: #94a3b8;">বর্তমান ব্যালেন্স</p>
            <div class="amount" id="userBalance">৳ 0</div>
            <button class="btn btn-primary" onclick="openModal('taskModal')">টাস্ক কমপ্লিট করুন</button>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--primary);">আজকের টাস্ক</h3>
            <p style="margin-top: 10px; color: #94a3b8;">নিচের বাটনে ক্লিক করে ৫ সেকেন্ড অপেক্ষা করুন।</p>
            
            <div id="timerDisplay" style="display: none;">৫</div>
            
            <button id="taskBtn" class="btn btn-primary" style="margin-top: 20px;" onclick="startTask()">লিংক ওপেন করুন</button>
            <button class="btn" style="background: transparent; color: #94a3b8; margin-top: 10px;" onclick="closeModal('taskModal')">বন্ধ করুন</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();

        let currentTaskUrl = "";
        let currentUserId = "";

        // ১. রিয়েল-টাইম টাস্ক লিংক আপডেট লিসেনার
        onSnapshot(doc(db, "settings", "taskConfig"), (snapshot) => {
            if (snapshot.exists()) {
                currentTaskUrl = snapshot.data().url;
                console.log("লিংক আপডেট হয়েছে:", currentTaskUrl);
            }
        });

        // ২. ইউজার ডাটা ও ব্যালেন্স লিসেনার
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        document.getElementById('userName').innerText = "স্বাগতম, " + data.name;
                        document.getElementById('userBalance').innerText = "৳ " + data.balance;
                    }
                });
            }
        });

        // ৩. টাস্ক ফাংশন (৫ সেকেন্ড টাইমার সহ)
        window.startTask = () => {
            if (!currentTaskUrl) {
                alert("অ্যাডমিন এখনো কোনো লিংক সেট করেনি!");
                return;
            }

            // নতুন ট্যাবে লিংক ওপেন
            window.open(currentTaskUrl, '_blank');

            const btn = document.getElementById('taskBtn');
            const timerDiv = document.getElementById('timerDisplay');
            
            btn.disabled = true;
            btn.innerText = "কাজ চলছে...";
            timerDiv.style.display = "block";

            let timeLeft = 5;
            const timer = setInterval(async () => {
                timeLeft--;
                timerDiv.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timerDiv.style.display = "none";
                    
                    // ৪. অটোমেটিক টাকা যোগ করা
                    try {
                        await updateDoc(doc(db, "users", currentUserId), {
                            balance: increment(10)
                        });
                        alert("অভিনন্দন! ১০ টাকা আপনার ব্যালেন্সে যোগ করা হয়েছে।");
                        closeModal('taskModal');
                        btn.disabled = false;
                        btn.innerText = "লিংক ওপেন করুন";
                    } catch (e) {
                        alert("টাকা যোগ করতে সমস্যা হয়েছে!");
                    }
                }
            }, 1000);
        };
    </script>

    <script>
        function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
        function openModal(id) { closeSidebar(); document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
