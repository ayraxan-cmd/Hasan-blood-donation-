<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --accent: #facc15; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg); color: #fff; overflow-x: hidden; }

        /* Splash Screen */
        #welcomeScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .logo-circle { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 0 20px var(--primary); margin-bottom: 15px; animation: pulse 2s infinite; }

        .navbar { background: #111827; padding: 18px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1f2937; }
        .nav-brand { font-size: 20px; font-weight: 700; margin-left: 15px; }

        .view-section { display: none; min-height: 100vh; padding: 20px; padding-bottom: 80px; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        /* স্ক্রিনশট অনুযায়ী স্বাগতম ব্যানার */
        .welcome-card { background: linear-gradient(135deg, #22c55e, #16a34a); padding: 35px 20px; border-radius: 24px; text-align: center; margin-bottom: 20px; }
        .welcome-card h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .welcome-card p { font-size: 16px; opacity: 0.9; }

        /* স্ক্রিনশট অনুযায়ী ব্যালেন্স বক্স */
        .balance-card { background: var(--card); border-radius: 24px; padding: 30px 20px; text-align: center; border: 1px solid #334155; margin-bottom: 20px; }
        .balance-card span { font-size: 18px; color: #94a3b8; }
        .balance-card h1 { font-size: 45px; color: var(--primary); margin-top: 10px; font-weight: 800; }

        /* প্রফিট কার্ড */
        .profit-card { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #334155; }
        .profit-card h3 { font-size: 22px; margin-bottom: 5px; }
        .profit-card p { color: #94a3b8; margin-bottom: 20px; font-size: 14px; }

        .btn-main { background: var(--primary); color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); }

        /* সিডবার ও অন্যান্য */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); z-index: 2005; transition: 0.4s; padding: 20px; }
        .sidebar.active { left: 0; }
        .sidebar-item { padding: 15px; color: #cbd5e1; cursor: pointer; border-bottom: 1px solid #334155; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }

        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
        @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(34, 197, 94, 0);} 100% {box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);} }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <div class="logo-circle">৳</div>
        <h1>SMART INVEST</h1>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>

    <div class="sidebar" id="sidebar">
        <h2 style="color:var(--primary); margin-bottom:20px;">মেনু</h2>
        <div class="sidebar-item" onclick="showView('homeView')">🏠 হোম পেজ</div>
        <div class="sidebar-item" onclick="showView('withdrawView')">📤 উইথড্র</div>
        <div class="sidebar-item" onclick="openDeposit()">📥 ডিপোজিট</div>
        <div class="sidebar-item" onclick="window.open('https://wa.me/8801946024013')">💬 সাপোর্ট</div>
        <div class="sidebar-item" style="color:var(--danger)" onclick="signOutUser()">🚪 লগআউট</div>
    </div>

    <div id="homeView" class="view-section">
        <div class="navbar" style="margin: -20px -20px 20px -20px;">
            <div onclick="toggleMenu(true)" style="font-size: 24px; color: var(--primary);">☰</div>
            <div class="nav-brand">Smart Invest BD</div>
        </div>
        
        <div class="container">
            <div class="welcome-card">
                <h2 id="userName">স্বাগতম, User</h2>
                <p>আপনার নিরাপদ বিনিয়োগের বিশ্বস্ত সঙ্গী</p>
            </div>

            <div class="balance-card">
                <span>বর্তমান ব্যালেন্স</span>
                <h1 id="userBalance">৳ 000</h1>
            </div>

            <div class="profit-card">
                <h3>মাসিক প্রফিট ১৫%</h3>
                <p>মিনিমাম ইনভেস্ট ৮১০০০</p>
                <button class="btn-main" onclick="handleTask()">এখনই শুরু করুন</button>
            </div>
        </div>
    </div>

    <div id="authView" class="view-section">
        <div class="balance-card" style="margin-top: 50px;">
            <h2>প্রবেশ করুন</h2><br>
            <input type="email" id="email" placeholder="ইমেইল" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; background:#0f172a; border:1px solid #334155; color:#fff;">
            <input type="password" id="pass" placeholder="পাসওয়ার্ড" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; background:#0f172a; border:1px solid #334155; color:#fff;">
            <button class="btn-main" onclick="login()">লগইন</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        // ১. লোডিং ফিক্স
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('welcomeScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('welcomeScreen').style.display = 'none', 500);
            }, 2000);
        });

        // ২. ইউজারের ডাটা লোড করা
        onAuthStateChanged(auth, (user) => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('userName').innerText = "স্বাগতম, " + (d.name || "User");
                        document.getElementById('userBalance').innerText = "৳ " + (d.balance || 0);
                        showView('homeView');
                    }
                });
            } else {
                showView('authView');
            }
        });

        // ৩. লগইন ফাংশন (সাইটে ঢুকার জন্য)
        window.login = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert("ভুল ইমেইল বা পাসওয়ার্ড!"); }
        };

        // ৪. টাস্ক ফাংশন
        window.handleTask = async () => {
            window.open("https://www.facebook.com/facebookuser1972", "_blank");
            setTimeout(async () => {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(10) });
                alert("১০ টাকা যোগ হয়েছে!");
            }, 5000);
        };

        // ৫. ইউটিলিটি
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleMenu(false);
        };
        window.toggleMenu = (o) => {
            document.getElementById('sidebar').classList.toggle('active', o);
            document.getElementById('overlay').style.display = o ? 'block' : 'none';
        };
        window.signOutUser = () => signOut(auth);
    </script>
</body>
</html>
