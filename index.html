<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invest BD</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; }

        /* Navigation Control */
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 30px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        .navbar { background: var(--card); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); margin-right: 15px; }

        .container { padding: 20px; max-width: 480px; margin: 0 auto; }
        .hero-card { background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        
        /* Balance UI with Gaps */
        .stat-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #334155; text-align: center; margin-bottom: 20px; }
        .balance-title { color: #94a3b8; font-size: 16px; letter-spacing: 1px; }
        .amount { font-size: 42px; font-weight: 700; color: var(--primary); margin: 20px 0; display: block; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 17px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-primary { background: var(--primary); color: white; }

        /* Modal / Popups */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1005; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        #timerDisplay { font-size: 50px; font-weight: 800; color: #fbbf24; margin: 20px 0; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        @keyframes fadeIn { from {opacity: 0; transform: scale(0.98);} to {opacity: 1; transform: scale(1);} }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <div class="navbar">
            <div class="menu-btn">☰</div>
            <div style="font-weight: 700;">Smart Invest BD</div>
        </div>
        <div class="container">
            <div class="hero-card">
                <h2 id="userName">স্বাগতম!</h2>
                <p>আপনার নিরাপদ বিনিয়োগের বিশ্বস্ত সঙ্গী</p>
            </div>

            <div class="stat-card">
                <p class="balance-title">ব র্ত মা ন  ব্যা লে ন্স</p>
                <div class="amount" id="userBalance">৳ 0</div>
                <button class="btn btn-primary" onclick="navigateTo('taskPage')">টাস্ক কমপ্লিট করুন</button>
            </div>
        </div>
    </div>

    <div id="taskPage" class="page">
        <div class="navbar">
            <div class="menu-btn" onclick="navigateTo('homePage')">←</div>
            <div style="font-weight: 700;">ডেইলি টাস্ক</div>
        </div>
        <div class="container">
            <div class="stat-card" style="margin-top: 50px;">
                <h3 style="color: var(--primary);">আজকের টাস্ক</h3>
                <p style="margin: 20px 0; color: #94a3b8; line-height: 1.6;">বাটনে ক্লিক করলে একটি কাজের লিংক ওপেন হবে। ৫ সেকেন্ড অপেক্ষা করলেই আপনার একাউন্টে ১০ টাকা যোগ হবে।</p>
                
                <div id="timerDisplay" style="display: none;">৫</div>
                
                <button id="taskBtn" class="btn btn-primary" onclick="runTask()">লিংক ওপেন করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByoyfmwZJyIwYj09NdLwHLpsAVZ0joZq4",
            authDomain: "investmentc12-887a8.firebaseapp.com",
            projectId: "investmentc12-887a8",
            storageBucket: "investmentc12-887a8.firebasestorage.app",
            messagingSenderId: "235522350741",
            appId: "1:235522350741:web:c1c5b9417dd3875e7d059c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();

        let taskUrl = "";
        let uid = "";

        // রিয়েল-টাইম টাস্ক লিংক লিসেনার
        onSnapshot(doc(db, "settings", "taskConfig"), (s) => {
            if(s.exists()) taskUrl = s.data().url;
        });

        // ইউজার ডাটা লিসেনার
        onAuthStateChanged(auth, (user) => {
            if (user) {
                uid = user.uid;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) {
                        const d = snap.data();
                        document.getElementById('userName').innerText = "স্বাগতম, " + d.name;
                        document.getElementById('userBalance').innerText = "৳ " + d.balance.toLocaleString();
                    }
                });
            }
        });

        // টাস্ক লজিক
        window.runTask = () => {
            if(!taskUrl) return alert("কোনো কাজ পাওয়া যায়নি!");

            // নতুন উইন্ডোতে লিংক ওপেন (আপনার চাহিদা অনুযায়ী)
            window.open(taskUrl, '_blank');

            const btn = document.getElementById('taskBtn');
            const timerDiv = document.getElementById('timerDisplay');
            
            btn.disabled = true;
            btn.innerText = "অপেক্ষা করুন...";
            timerDiv.style.display = "block";

            let count = 5;
            const timer = setInterval(async () => {
                count--;
                timerDiv.innerText = count;
                if(count <= 0) {
                    clearInterval(timer);
                    timerDiv.style.display = "none";
                    try {
                        await updateDoc(doc(db, "users", uid), { balance: increment(10) });
                        alert("৳১০ যোগ করা হয়েছে!");
                        navigateTo('homePage'); // কাজ শেষ হলে হোমে ফিরবে
                        btn.disabled = false;
                        btn.innerText = "লিংক ওপেন করুন";
                    } catch (e) { alert("Error!"); }
                }
            }, 1000);
        };

        // নেভিগেশন হ্যান্ডলার (Back Button Fix)
        window.navigateTo = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            // হিস্ট্রিতে পুশ করা যাতে ব্যাক বাটন চাপলে অ্যাপ বন্ধ না হয়
            history.pushState({page: pageId}, null, "");
        };

        window.onpopstate = (event) => {
            if (event.state && event.state.page) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(event.state.page).classList.add('active');
            } else {
                navigateTo('homePage');
            }
        };

        // ডিফল্ট হিস্ট্রি সেটআপ
        history.replaceState({page: 'homePage'}, null, "");
    </script>
</body>
</html>
